      <div class="section-header">

      <div class="section-header">
        <div class="section-letter">D</div>
        <div class="section-title">Cover Letter <span>Section D</span></div>
      </div>

      <div class="field">
        <label><strong>4.</strong> Cover letter <em style="color:var(--text-dim);font-style:normal;font-weight:300;">(max 350 words)</em></label>
        <div class="hint">Articulate, in no more than 350 words, why you are the most deserving candidate for this exclusive opportunity. Address your qualifications, evening presence, and dinner table etiquette.</div>
        <textarea id="f-cover" rows="9" placeholder="Dear Selection Committee,&#10;&#10;It is with great enthusiasm and firm belief in my own qualifications that I hereby submit this application..."></textarea>
        <div class="word-row">
          <div class="word-count">Words: <span class="num" id="wc">0</span> / 350</div>

<!-- Error toast -->
<div class="toast" id="toast"></div>

<script>
  const coverTA = document.getElementById('f-cover');
  const wcEl = document.getElementById('wc');
  const wsEl = document.getElementById('ws');

  coverTA.addEventListener('input', updateCount);

  function updateCount() {
    const v = coverTA.value.trim();
    const n = v === '' ? 0 : v.split(/\s+/).length;
    wcEl.textContent = n;
    wcEl.className = 'num' + (n > 350 ? ' over' : n >= 280 ? ' good' : '');
    wsEl.textContent = n === 0 ? '' : n < 100 ? 'Keep going...' : n <= 350 ? 'Looking strong!' : 'Exceeds limit — please trim.';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function handleSubmit() {
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const history = document.getElementById('f-history').value.trim();
    const cover = document.getElementById('f-cover').value.trim();
    const allConsent = ['c1','c2','c3','c4'].every(id => document.getElementById(id).checked);

    if (!name) { toast('Please enter your full name.'); return; }
    if (!phone || !email) { toast('Please provide both phone number and email.'); return; }
    if (!history) { toast('The indemnity declaration (Section C) is required.'); return; }
    const wc = cover === '' ? 0 : cover.split(/\s+/).length;
    if (wc < 50) { toast('Your cover letter is too short — please elaborate.'); return; }
    if (wc > 350) { toast('Cover letter exceeds 350 words. Please trim it.'); return; }
    if (!allConsent) { toast('All four consent declarations must be confirmed.'); return; }

    document.getElementById('form-fields').style.display = 'none';
    document.getElementById('success-overlay').style.display = 'block';
  }
</script>
